# NetSentry engine configuration — v0.1.0
# All values support ${ENV_VAR} and ${ENV_VAR:default} substitution.

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout_sec: 10
  write_timeout_sec: 10

api_auth:
  enabled: false
  # Set token via env var; never hard-code in this file.
  # token: "${NS_API_TOKEN}"

capture:
  uds_path: "/tmp/netsentry.sock"
  channel_capacity: 10000
  worker_count: 1          # v0.1.0: single worker, no race on state
  max_payload_len: 4096

rules:
  file: "configs/rules.json"

storage:
  data_dir: "data"
  ttl_days: 7              # alert DBs older than this are deleted automatically
  wal_file: "data/alert_wal.jsonl"

logging:
  level: "info"            # debug | info | warn | error
  format: "json"           # json | console
  output: "stdout"         # stdout | /path/to/file.log

metrics:
  enabled: true
  path: "/api/metrics"

alerting:
  aggregation_window_sec: 60
  aggregation_flush_interval_sec: 10
  batch_size: 100
  batch_flush_sec: 5
  critical_flush_sec: 1
  critical_batch_size: 10
