# NetSentry configuration — v0.1.0 development
# Values support ${ENV_VAR} and ${ENV_VAR:default} substitution.

capture:
  mode: "offline"
  offline_file: "/tmp/netsentry_test.pcap"
  payload_preview_len: 4096
  uds_socket_path: "/tmp/netsentry.sock"
  uds_socket_mode: "0600"
  heartbeat_interval: 5

engine:
  uds_socket_path: "/tmp/netsentry.sock"
  channel_buffer_size: 10000
  worker_count: 1
  db_dir: "data"
  db_path: "data/netsentry.db"
  db_shard_daily: false
  db_journal_mode: "WAL"
  db_busy_timeout: 5000
  rules_seed_file: "configs/rules.json"
  api_port: 8080
  cors_allowed_origins: ["http://localhost:3000"]
  alert_aggregation_window: 60
  alert_aggregation_max_count: 100
  alert_retention_days: 7
  api_auth_enabled: false
  api_auth_token: "${NETSENTRY_API_TOKEN:}"
  redact_sensitive_fields: true
  health_freshness_limit_seconds: 30
  pprof_enabled: false
  pprof_addr: "127.0.0.1:6060"

logging:
  level: "info"
  format: "json"
  engine_log: "logs/engine.log"
