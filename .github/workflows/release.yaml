name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential gcc make libpcap-dev python3 curl

      - name: Install pinned supply-chain tools
        run: |
          cd engine
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run supply-chain checks
        env:
          SUPPLY_CHAIN_FETCH_ASSETS: "1"
        run: make supply-chain-check

      - name: Derive release metadata
        id: meta
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${RELEASE_TAG#v}"
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "unsupported release tag: ${RELEASE_TAG}" >&2
            exit 1
          }
          case "$(uname -m)" in
            x86_64) RELEASE_ARCH="amd64" ;;
            aarch64|arm64) RELEASE_ARCH="arm64" ;;
            *) RELEASE_ARCH="$(uname -m)" ;;
          esac
          {
            echo "release_tag=${RELEASE_TAG}"
            echo "release_version=${RELEASE_VERSION}"
            echo "release_os=$(uname -s | tr '[:upper:]' '[:lower:]')"
            echo "release_arch=${RELEASE_ARCH}"
          } >>"${GITHUB_OUTPUT}"

      - name: Run release-candidate checks
        env:
          DOCKER: docker
          IMAGE: netsentry:release-${{ github.run_id }}
          VERSION: ${{ steps.meta.outputs.release_version }}
        run: make rc-check

      - name: Enforce reviewed release evidence gate
        env:
          RELEASE_EVIDENCE: docs/evidence/release-${{ steps.meta.outputs.release_tag }}.md
        run: |
          test -f "${RELEASE_EVIDENCE}" || {
            echo "missing reviewed release evidence: ${RELEASE_EVIDENCE}" >&2
            exit 1
          }
          make release-gate

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.meta.outputs.release_version }}
        run: make release-artifacts VERSION="${VERSION}"

      - name: Write release notes
        id: notes
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.meta.outputs.release_version }}
          RELEASE_OS: ${{ steps.meta.outputs.release_os }}
          RELEASE_ARCH: ${{ steps.meta.outputs.release_arch }}
        run: |
          set -euo pipefail
          PACKAGE_NAME="netsentry-${RELEASE_VERSION}-${RELEASE_OS}-${RELEASE_ARCH}"
          ARCHIVE_PATH="dist/${PACKAGE_NAME}.tar.gz"
          CHECKSUM_PATH="dist/${PACKAGE_NAME}.tar.gz.sha256"
          NOTES_FILE="$(mktemp)"

          [[ -f "${ARCHIVE_PATH}" ]] || {
            echo "missing release archive: ${ARCHIVE_PATH}" >&2
            exit 1
          }
          [[ -f "${CHECKSUM_PATH}" ]] || {
            echo "missing release checksum: ${CHECKSUM_PATH}" >&2
            exit 1
          }

          cat >"${NOTES_FILE}" <<EOF
          # NetSentry ${RELEASE_TAG}

          Automated GitHub Release for ${RELEASE_TAG}.

          Included assets:
          - ${PACKAGE_NAME}.tar.gz
          - ${PACKAGE_NAME}.tar.gz.sha256

          Validation:
          - GitHub Actions reran \`make rc-check\` before publishing these assets.

          References:
          - \`CHANGELOG.md\`
          - \`docs/release-readiness.md\`
          EOF
          echo "notes_file=${NOTES_FILE}" >>"${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: NetSentry ${{ steps.meta.outputs.release_tag }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: |
            dist/netsentry-${{ steps.meta.outputs.release_version }}-${{ steps.meta.outputs.release_os }}-${{ steps.meta.outputs.release_arch }}.tar.gz
            dist/netsentry-${{ steps.meta.outputs.release_version }}-${{ steps.meta.outputs.release_os }}-${{ steps.meta.outputs.release_arch }}.tar.gz.sha256
          fail_on_unmatched_files: true
