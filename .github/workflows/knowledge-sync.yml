name: Knowledge Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: netsentry-knowledge-sync
  cancel-in-progress: false

jobs:
  generate-preview:
    name: Generate reviewable knowledge artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out NetSentry history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Test deterministic knowledge extraction
        run: python3 -m unittest scripts/test_sync_knowledge.py

      - name: Generate knowledge preview
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          VAULT_PATH: ${{ runner.temp }}/NetSentry-Knowledge
        run: |
          python3 scripts/sync_knowledge.py \
            --repo . \
            --vault "${VAULT_PATH}" \
            --before "${BEFORE_SHA}" \
            --after "${AFTER_SHA}"

      - name: Upload knowledge artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: netsentry-knowledge-${{ github.sha }}
          path: ${{ runner.temp }}/NetSentry-Knowledge
          if-no-files-found: error
          retention-days: 30

  sync-knowledge-repository:
    name: Append to configured knowledge repository
    if: ${{ vars.NETSENTRY_KNOWLEDGE_REPO != '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out NetSentry history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          path: source

      - name: Check out knowledge repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ vars.NETSENTRY_KNOWLEDGE_REPO }}
          ref: ${{ vars.NETSENTRY_KNOWLEDGE_BRANCH || 'main' }}
          token: ${{ secrets.KNOWLEDGE_SYNC_TOKEN }}
          path: knowledge

      - name: Append extracted knowledge
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          python3 source/scripts/sync_knowledge.py \
            --repo source \
            --vault knowledge \
            --before "${BEFORE_SHA}" \
            --after "${AFTER_SHA}"

      - name: Commit and push knowledge changes
        env:
          KNOWLEDGE_BRANCH: ${{ vars.NETSENTRY_KNOWLEDGE_BRANCH || 'main' }}
        run: |
          git -C knowledge config user.name "netsentry-knowledge-bot"
          git -C knowledge config user.email "netsentry-knowledge-bot@users.noreply.github.com"
          git -C knowledge add --all
          if git -C knowledge diff --cached --quiet; then
            echo "No knowledge changes to publish"
            exit 0
          fi
          git -C knowledge commit -m "docs: sync NetSentry knowledge for ${GITHUB_SHA::10}"
          git -C knowledge pull --rebase origin "${KNOWLEDGE_BRANCH}"
          git -C knowledge push origin "HEAD:${KNOWLEDGE_BRANCH}"

  sync-local-vault:
    name: Append to self-hosted Obsidian vault
    if: ${{ vars.NETSENTRY_KNOWLEDGE_SELF_HOSTED == 'true' }}
    runs-on: [self-hosted, linux, netsentry-knowledge]
    timeout-minutes: 10
    steps:
      - name: Check out NetSentry history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Append to local vault
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
          VAULT_PATH: ${{ vars.NETSENTRY_VAULT_PATH }}
        run: |
          test -n "${VAULT_PATH}"
          test -d "${VAULT_PATH}"
          python3 scripts/sync_knowledge.py \
            --repo . \
            --vault "${VAULT_PATH}" \
            --before "${BEFORE_SHA}" \
            --after "${AFTER_SHA}"
