name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag for manual runs"
        required: false
        type: string
      push_image:
        description: "Push image to GHCR"
        required: true
        default: false
        type: boolean
      release_evidence:
        description: "Reviewed release evidence path for a manual run"
        required: false
        default: "docs/evidence/release-v0.1.1.md"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  docker:
    name: Build and publish image
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential gcc make libpcap-dev python3 curl

      - name: Install pinned supply-chain tools
        run: |
          cd engine
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run supply-chain checks
        env:
          SUPPLY_CHAIN_FETCH_ASSETS: "1"
        run: make supply-chain-check

      - name: Resolve release metadata
        id: release
        env:
          MANUAL_RELEASE_EVIDENCE: ${{ inputs.release_evidence }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
              echo "unsupported release tag: ${RELEASE_TAG}" >&2
              exit 1
            }
            RELEASE_VERSION="${RELEASE_TAG#v}"
            RELEASE_EVIDENCE="docs/evidence/release-${RELEASE_TAG}.md"
          else
            RELEASE_VERSION="0.1.1-publish.${GITHUB_RUN_NUMBER}"
            RELEASE_EVIDENCE="${MANUAL_RELEASE_EVIDENCE}"
          fi
          [[ "${RELEASE_EVIDENCE}" =~ ^docs/evidence/release-v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?\.md$ ]] || {
            echo "unsupported release evidence path: ${RELEASE_EVIDENCE}" >&2
            exit 1
          }
          test -f "${RELEASE_EVIDENCE}" || {
            echo "missing reviewed release evidence: ${RELEASE_EVIDENCE}" >&2
            exit 1
          }
          {
            echo "version=${RELEASE_VERSION}"
            echo "evidence=${RELEASE_EVIDENCE}"
          } >>"${GITHUB_OUTPUT}"

      - name: Run release-candidate checks
        env:
          DOCKER: docker
          IMAGE: netsentry:publish-${{ github.run_id }}
          VERSION: ${{ steps.release.outputs.version }}
        run: make rc-check

      - name: Enforce reviewed release evidence gate
        env:
          RELEASE_EVIDENCE: ${{ steps.release.outputs.evidence }}
        run: make release-gate

      - name: Log in to GHCR
        if: github.event_name == 'push' || inputs.push_image
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/netsentry
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref_name, 'v') }}
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
            type=raw,value=manual-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag == '' }}

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: ${{ github.event_name == 'push' || inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify published image
        if: github.event_name == 'push' || inputs.push_image
        env:
          IMAGE_TAG: ${{ inputs.image_tag || github.ref_name }}
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/${{ github.repository_owner }}/netsentry"
          docker buildx imagetools inspect "${IMAGE}:${IMAGE_TAG}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${IMAGE_TAG}" == v* ]]; then
            docker buildx imagetools inspect "${IMAGE}:${IMAGE_TAG#v}"
          fi
